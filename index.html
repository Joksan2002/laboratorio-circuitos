<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirigiendo | Laboratorio de Circuitos ISC-UNAH-COMAYAGUA</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a, #1e3a8a, #0ea5e9);
      color: white;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 35px 25px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .icon {
      width: 85px;
      height: 85px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      animation: pulse 1.8s infinite;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    p {
      font-size: 1rem;
      opacity: 0.95;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .loader {
      width: 100%;
      max-width: 280px;
      height: 8px;
      background: rgba(255,255,255,0.2);
      border-radius: 999px;
      margin: 0 auto 18px;
      overflow: hidden;
    }

    .loader span {
      display: block;
      height: 100%;
      width: 40%;
      background: white;
      border-radius: 999px;
      animation: loading 1.5s infinite ease-in-out;
    }

    .small-text {
      font-size: 0.9rem;
      opacity: 0.85;
    }

    @keyframes loading {
      0% {
        transform: translateX(-100%);
      }
      100% {
        transform: translateX(350%);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(255,255,255,0.35);
      }
      50% {
        transform: scale(1.05);
        box-shadow: 0 0 0 15px rgba(255,255,255,0);
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 28px 18px;
      }

      h1 {
        font-size: 1.3rem;
      }

      p {
        font-size: 0.95rem;
      }

      .icon {
        width: 72px;
        height: 72px;
        font-size: 32px;
      }
    }
  </style>

  <!-- Redirección automática -->
  <meta http-equiv="refresh" content="5;url=#" />
</head>
<body>
  <div class="container">
    <div class="icon">🔗</div>
    <h1>Redirigiendo al Laboratorio de Circuitos ISC-UNAH-COMAYAGUA</h1>
    <p>
      Por favor espera un momento mientras te enviamos al enlace correspondiente.
    </p>

    <div class="loader">
      <span></span>
    </div>

    <div class="small-text">
      Serás redirigido automáticamente en unos segundos...
    </div>
  </div>

  <script>
    // Cambia esta URL por el enlace real
    const destino = "https://tuenlace.com";

    setTimeout(() => {
      window.location.href = destino;
    }, 5000);
  </script>
</body>
</html>
